# =========================================================================
# consumer-pipeline-use.yaml
#
# Demonstrates pipeline-level use: where the ENTIRE pipeline definition
# comes from a library export. The consumer only provides inputs.
# =========================================================================
schemaVersion: 1

resources:
  repositories:
    - repository: local-lib-repo
      type: git
      name: https://github.com/adityajalkhare/yaml-jobs-demo.git
      ref: main
      path: local-lib                      # subdirectory within the cloned repo

yamlLibraries:
  - name: local
    repository: local-lib-repo
    version: "2.0.0"

# Pipeline-level use: replaces the entire pipeline: block
use: local/standardCi
inputs:
  appName: "my-service"
  runDeploy: true
