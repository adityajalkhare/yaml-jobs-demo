# Stage export: testStage
# Inputs: suite (string, required), branch (string), verbose (boolean)
stage: "Test (${{ inputs.suite }})"
when:
  branch: "${{ inputs.branch }}"
environment:
  TEST_SUITE: "${{ inputs.suite }}"
${{ if inputs.verbose }}
  VERBOSE: "true"
${{ end }}
steps:
  - echo: "Running ${{ inputs.suite }} tests on branch ${{ inputs.branch }}"
  - sh: "echo 'Suite=${{ inputs.suite }}' && echo 'Result: PASS'"
post:
  success:
    - echo: "${{ inputs.suite }} tests passed"
  failure:
    - echo: "${{ inputs.suite }} tests FAILED"
  always:
    - echo: "${{ inputs.suite }} stage complete"
