# Step export: deploySteps
# Inputs: target (string, required), dryRun (boolean), retries (int), tags (list), extraEnv (map)
steps:
  - echo: "Deploying to ${{ inputs.target }} (dry-run=${{ inputs.dryRun }}, retries=${{ inputs.retries }})"
  - echo: "Tags: ${{ inputs.tags }}"
  ${{ if inputs.extraEnv }}
  - echo: "Extra environment provided: ${{ inputs.extraEnv }}"
  ${{ end }}
  - sh: |
      echo "--- Deploy simulation ---"
      echo "Target: ${{ inputs.target }}"
      echo "Dry run: ${{ inputs.dryRun }}"
      for i in $(seq 1 ${{ inputs.retries }}); do
        echo "Attempt $i of ${{ inputs.retries }}"
      done
      echo "--- Deploy complete ---"
